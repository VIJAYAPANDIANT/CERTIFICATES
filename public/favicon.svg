<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main Certificate Border Rect -->
  <rect x="4" y="6" width="40" height="36" rx="6" fill="#030014" stroke="url(#grad)" stroke-width="3" filter="url(#glow)" />
  <!-- Accent top tab -->
  <path d="M18 6h12l-2 4h-8z" fill="#06b6d4" />
  <!-- Holographic lines representation -->
  <rect x="12" y="15" width="24" height="3" rx="1.5" fill="#8b5cf6" />
  <rect x="10" y="23" width="28" height="2" rx="1" fill="#06b6d4" opacity="0.9" />
  <rect x="10" y="28" width="16" height="2" rx="1" fill="#06b6d4" opacity="0.9" />
  <!-- Seal Ribbon details -->
  <path d="M31 30l-1.5 9 2.5-1.5 2.5 1.5-1.5-9z" fill="#d946ef" />
  <path d="M35 30l-1.5 9 2.5-1.5 2.5 1.5-1.5-9z" fill="#06b6d4" />
  <!-- Golden Seal Circle -->
  <circle cx="33" cy="30" r="5.5" fill="#eab308" stroke="#fbbf24" stroke-width="1.5" />
  <!-- Star symbol inside seal -->
  <path d="M33 28.5l.4.9.9.1-.7.6.2.9-.8-.5-.8.5.2-.9-.7-.6.9-.1z" fill="#fff" />
</svg>